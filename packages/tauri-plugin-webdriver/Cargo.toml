[package]
name = "tauri-plugin-wdio-webdriver"
version = "1.0.0"
authors = [ "You" ]
description = "Embedded WebDriver server for WDIO Tauri testing"
license = "MIT"
repository = "https://github.com/webdriverio/desktop-mobile"
keywords = [ "tauri", "webdriver", "wdio", "testing", "automation" ]
categories = [ "development-tools::testing", "gui" ]
edition = "2021"
rust-version = "1.77"
exclude = [ "/examples" ]
links = "tauri-plugin-wdio-webdriver"

[dependencies]
serde_json = "1"
thiserror = "2"
axum = "0.8"
base64 = "0.22"
tracing = "0.1"
async-trait = "0.1"
tempfile = "3"

[dependencies.tauri]
version = "2.10.0"

[dependencies.serde]
version = "1.0"
features = [ "derive" ]

[dependencies.tokio]
version = "1"
features = [ "rt-multi-thread", "sync", "net", "time" ]

[dependencies.uuid]
version = "1"
features = [ "v4" ]

[target."cfg(target_os = \"macos\")".dependencies]
objc2 = "0.6"
block2 = "0.6"

[target."cfg(target_os = \"macos\")".dependencies.objc2-foundation]
version = "0.3"
features = [ "NSString", "NSData", "NSError", "NSArray", "NSDictionary" ]

[target."cfg(target_os = \"macos\")".dependencies.objc2-app-kit]
version = "0.3"
features = [ "NSImage", "NSImageRep", "NSBitmapImageRep" ]

[target."cfg(target_os = \"macos\")".dependencies.objc2-web-kit]
version = "0.3"
features = [ "WKWebView", "WKSnapshotConfiguration", "WKUIDelegate", "WKPDFConfiguration", "WKFrameInfo", "WKContentWorld", "block2", "objc2-app-kit" ]

[target."cfg(target_os = \"windows\")".dependencies]
webview2-com = "0.38"
windows-core = "0.61"

[target."cfg(target_os = \"windows\")".dependencies.windows]
version = "0.61"
features = [ "Win32_System_Com", "Win32_System_WinRT" ]

[target."cfg(target_os = \"linux\")".dependencies]
webkit2gtk = "2.0"
javascriptcore-rs = "1.1"
glib = "0.21"
gtk = "0.18"

[target."cfg(target_os = \"linux\")".dependencies.cairo-rs]
version = "0.18"
features = [ "png" ]

[build-dependencies.tauri-plugin]
version = "2.5.3"
features = [ "build" ]
