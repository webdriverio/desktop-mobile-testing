name: "WDIO Desktop Mobile CodeQL Config"

paths-ignore:
  - '**/*.spec.ts'
  - '**/*.spec.js'
  - '**/*.spec.mts'
  - '**/*.spec.cts'
  - '**/test/**'
  - '**/e2e/**'
  - '**/fixtures/**'
  - '**/coverage/**'

# Exclude artifact-poisoning queries - these are false positives in our codebase.
# See artifact-poisoning-analysis.md in this directory for rationale.
query-filters:
  - exclude:
      id: actions/artifact-poisoning/critical
  - exclude:
      id: actions/artifact-poisoning/medium
