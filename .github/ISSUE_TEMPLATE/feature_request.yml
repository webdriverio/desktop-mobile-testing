name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[✨ Feature]: "
labels: ["type:enhancement"]
body:
  - type: checkboxes
    attributes:
      label: Have you read the Contributing Guidelines?
      options:
        - label: I have read the [Contributing Guidelines](https://github.com/webdriverio/desktop-mobile/blob/main/CONTRIBUTING.md)
          required: true

  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide details below.

  - type: dropdown
    id: scope
    attributes:
      label: Which area does this feature affect?
      description: Select the area where this feature would be implemented
      options:
        - Electron Service (@wdio/electron-service)
        - Tauri Service (@wdio/tauri-service)
        - Shared Utilities (@wdio/native-utils, @wdio/native-types)
        - Electron CDP Bridge (@wdio/electron-cdp-bridge)
        - Tauri Plugin (@wdio/tauri-plugin)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the problem you're trying to solve or the use case you have.
        Why is this feature needed?
      placeholder: |
        I'm frustrated when...
        Currently there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Describe how you envision this feature working.
        Be as detailed as possible.
      placeholder: |
        I'd like to be able to...
        The API could look like...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: |
        What alternative solutions or features have you considered?
        Are there workarounds you're currently using?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: |
        Add any other context, screenshots, code examples, or links about the feature request.
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/webdriverio/desktop-mobile/blob/main/CODE_OF_CONDUCT.md)
          required: true

  - type: checkboxes
    attributes:
      label: Is there an existing feature request for this?
      options:
        - label: I have searched the [existing issues](https://github.com/webdriverio/desktop-mobile/issues)
          required: true
