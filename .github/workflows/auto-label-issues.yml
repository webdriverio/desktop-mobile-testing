name: Auto-label issues

permissions:
  issues: write

on:
  issues:
    types: [opened]

jobs:
  label-scope:
    runs-on: ubuntu-latest
    steps:
      - name: Extract scope and apply area label
        uses: actions/github-script@v8
        with:
          script: |
            // Get issue number from context.payload since context.issue may be undefined
            const issueNumber = context.payload.issue.number;
            const body = context.payload.issue.body || '';

            // Match both the issue template dropdown format and plain text
            const scopeLabels = [
              { patterns: ['Electron Service', '@wdio/electron-service'], label: 'scope:electron' },
              { patterns: ['Tauri Service', '@wdio/tauri-service'], label: 'scope:tauri' },
              { patterns: ['Shared Utilities', '@wdio/native-utils', '@wdio/native-types'], label: 'scope:shared' },
              { patterns: ['Electron CDP Bridge', '@wdio/electron-cdp-bridge'], label: 'scope:electron' },
              { patterns: ['Tauri Plugin', '@wdio/tauri-plugin'], label: 'scope:tauri' },
              { patterns: ['Documentation'], label: 'area:documentation' }
            ];

            for (const { patterns, label } of scopeLabels) {
              const matched = patterns.some(pattern => body.includes(pattern));
              if (matched) {
                await github.rest.issues.addLabels({
                  issue_number: issueNumber,
                  labels: [label],
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                console.log(`Applied label ${label} for pattern match: ${patterns.find(p => body.includes(p))}`);
                break;
              }
            }

  label-platform:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, '[🐛 Bug]')
    steps:
      - name: Extract platform and apply OS label
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const body = context.payload.issue.body || '';

            const platformLabels = {
              'Windows': 'os:windows',
              'macOS': 'os:macos',
              'Linux': 'os:linux'
            };

            for (const [key, label] of Object.entries(platformLabels)) {
              if (body.includes(key)) {
                await github.rest.issues.addLabels({
                  issue_number: issueNumber,
                  labels: [label],
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                console.log(`Applied label ${label} for platform: ${key}`);
                break;
              }
            }
