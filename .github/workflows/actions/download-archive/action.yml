name: 'Download and Extract Artifacts'
description: 'Downloads and extracts compressed artifacts shared from previous jobs using GitHub cache (90-day retention)'
inputs:
  path:
    description: 'Destination directory to extract the artifact contents'
    required: true
  filename:
    description: 'Filename of the compressed artifact to download'
    required: true
    default: 'artifact.zip'
  name:
    description: 'Artifact name as used in the cache key'
    required: true
  cache_key_prefix:
    description: 'Prefix for the cache key (must match upload setting)'
    default: 'build-artifacts'
    required: false
  exact_cache_key:
    description: 'Exact cache key to use for retrieval (if provided)'
    required: false
  use_cache:
    description: 'Use cache only (true-only or false-only)'
    required: false

runs:
  using: 'composite'
  steps:
    # Generate cache keys and check for rerun
    - name: 🔑 Generate Cache Keys
      id: generate-keys
      shell: bash
      run: |
        CACHE_PREFIX="${{ inputs.cache_key_prefix || 'artifacts' }}"
        NAME="${{ inputs.name }}"
        OS="${{ runner.os }}"
        RUN_ID="${{ github.run_id }}"

        # Handle rerun suffix
        RERUN_SUFFIX=""
        if [ "${{ github.run_attempt }}" -gt 1 ]; then
          RERUN_SUFFIX="-rerun${{ github.run_attempt }}"
        fi

        # Generate keys: exact (platform-specific), primary (with restore-keys), fallback
        EXACT_KEY="${OS}-${CACHE_PREFIX}-${NAME}-${RUN_ID}${RERUN_SUFFIX}"
        PRIMARY_KEY="${OS}-${CACHE_PREFIX}-${NAME}-${RUN_ID}${RERUN_SUFFIX}"
        FALLBACK_KEY="${CACHE_PREFIX}-${NAME}-"

        echo "exact_key=${EXACT_KEY}" >> $GITHUB_OUTPUT
        echo "primary_key=${PRIMARY_KEY}" >> $GITHUB_OUTPUT
        echo "fallback_key=${FALLBACK_KEY}" >> $GITHUB_OUTPUT

        # Normalize path for cache operations
        NORMALIZED_PATH=$(echo "${{ inputs.path }}/${{ inputs.filename }}" | sed 's|\\|/|g')
        echo "normalized_path=${NORMALIZED_PATH}" >> $GITHUB_OUTPUT

        echo "Generated cache keys:"
        echo "  exact_key: ${EXACT_KEY}"
        echo "  primary_key: ${PRIMARY_KEY}"
        echo "  fallback_key: ${FALLBACK_KEY}"

    # Single cache restore step with restore-keys for fallback
    - name: 🗄️ Restore Cache
      id: cache-restore
      if: inputs.use_cache != 'false-only'
      uses: actions/cache/restore@v4
      env:
        ACTIONS_CACHE_SERVICE_V2: 'true'
      with:
        path: ${{ steps.generate-keys.outputs.normalized_path }}
        key: ${{ inputs.exact_cache_key || steps.generate-keys.outputs.primary_key }}
        restore-keys: |
          ${{ steps.generate-keys.outputs.primary_key }}
          ${{ steps.generate-keys.outputs.fallback_key }}
        enableCrossOsArchive: true
        lookup-only: false
        fail-on-cache-miss: false

    # Download from GitHub Artifacts as fallback (or if cache-only requested)
    - name: 📥 Download from GitHub Artifacts
      id: download-artifact
      if: steps.cache-restore.outputs.cache-hit != 'true' && inputs.use_cache != 'true-only'
      shell: bash
      run: |
        mkdir -p "${{ inputs.path }}"

        MAX_RETRIES=3
        for i in $(seq 1 $MAX_RETRIES); do
          echo "Attempt $i of $MAX_RETRIES"
          gh run download --name "${{ inputs.name }}" --dir "${{ inputs.path }}" && break

          if [ $i -eq $MAX_RETRIES ]; then
            echo "::error::Failed to download artifact after $MAX_RETRIES attempts"
            exit 1
          fi

          SLEEP_TIME=$((2 ** $i))
          echo "Waiting ${SLEEP_TIME}s before retry..."
          sleep $SLEEP_TIME
        done

        NORMALIZED_PATH=$(echo "${{ inputs.path }}" | sed 's|\\|/|g')
        echo "Contents of download directory:"
        ls -la "$NORMALIZED_PATH" || echo "Directory listing failed"

        # Check if gh run download extracted contents directly
        if [ -d "$NORMALIZED_PATH/packages" ] || [ -d "$NORMALIZED_PATH/fixtures" ]; then
          echo "Artifact contents extracted directly to directory"
          echo "extracted=true" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
          echo "::notice::Successfully downloaded and extracted ${{ inputs.name }} from GitHub Artifacts"
          exit 0
        fi

        # Look for expected zip file
        EXPECTED_PATH="$NORMALIZED_PATH/${{ inputs.filename }}"
        if [ -f "$EXPECTED_PATH" ]; then
          echo "Found artifact at expected path: $EXPECTED_PATH"
          echo "extracted=false" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
          echo "::notice::Successfully downloaded ${{ inputs.name }} from GitHub Artifacts"
          exit 0
        fi

        # Search for any zip file
        FIRST_ZIP=$(find "$NORMALIZED_PATH" -type f -name "*.zip" 2>/dev/null | head -n 1)
        if [ -n "$FIRST_ZIP" ]; then
          echo "Found zip file: $FIRST_ZIP"
          if [ "$FIRST_ZIP" != "$EXPECTED_PATH" ]; then
            mv "$FIRST_ZIP" "$EXPECTED_PATH"
          fi
          echo "extracted=false" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
          echo "::notice::Successfully downloaded ${{ inputs.name }} from GitHub Artifacts"
          exit 0
        fi

        echo "::error::Failed to find downloaded artifact or extracted contents"
        exit 1
      env:
        GH_TOKEN: ${{ github.token }}

    # Fail if cache-only was requested but cache missed
    - name: ❌ Handle Cache Miss
      if: steps.cache-restore.outputs.cache-hit != 'true' && inputs.use_cache == 'true-only'
      shell: bash
      run: |
        echo "::error::Cache miss and use_cache=true-only, failing step"
        exit 1

    # Extract and copy artifact contents to workspace
    - name: 📂 Extract and Copy Archive
      id: extract-archive
      if: steps.cache-restore.outputs.cache-hit == 'true' || steps.download-artifact.outputs.success == 'true'
      shell: bash
      run: |
        # Reusable function to copy directories safely
        copy_directory() {
          local src_dir="$1"
          local dest_base="$2"

          local rel_path="${src_dir#$SOURCE_DIR/}"
          rel_path="${rel_path#./}"
          rel_path=$(echo "$rel_path" | sed 's|\\|/|g')
          local target_dir="${dest_base}/${rel_path}"
          local parent_dir=$(dirname "$target_dir")

          if [ ! -d "$parent_dir" ]; then
            mkdir -p "$parent_dir"
          fi

          if [ -d "$target_dir" ]; then
            cp -r "$src_dir"/* "$target_dir/" 2>/dev/null || true
          else
            cp -r "$src_dir" "$parent_dir/"
          fi
          echo "  ✓ Copied $rel_path"
        }

        # Determine source directory based on how we got the artifact
        # Note: actions/cache/restore extracts to the workspace root, not to inputs.path
        WORKSPACE="${{ github.workspace }}"
        INPUT_PATH="${{ inputs.path }}"
        
        if [ "${{ steps.cache-restore.outputs.cache-hit }}" == "true" ]; then
          # Cache hit: files were extracted to workspace root by actions/cache
          echo "Cache hit detected..."
          
          # Check if contents are in workspace root (cache extracts here)
          if [ -d "$WORKSPACE/packages" ] || [ -d "$WORKSPACE/fixtures" ]; then
            echo "Found extracted contents in workspace root"
            SOURCE_DIR="$WORKSPACE"
          elif [ -d "$INPUT_PATH/packages" ] || [ -d "$INPUT_PATH/fixtures" ]; then
            echo "Found extracted contents in inputs.path"
            SOURCE_DIR="$INPUT_PATH"
          else
            # Fallback: check inputs.path for zip file
            echo "Looking for zip file in inputs.path..."
            SOURCE_DIR="$INPUT_PATH"
          fi
        elif [ "${{ steps.download-artifact.outputs.extracted }}" == "true" ]; then
          # gh run download extracted directly to inputs.path
          echo "Artifact was extracted by gh run download, copying to workspace..."
          SOURCE_DIR="$INPUT_PATH"
        else
          # Need to extract from downloaded zip file
          ARCHIVE_PATH="$INPUT_PATH/${{ inputs.filename }}"
          if [ ! -f "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found for extraction: $ARCHIVE_PATH"
            exit 1
          fi

          NORMALIZED_PATH=$(echo "$ARCHIVE_PATH" | sed 's|\\|/|g')
          SOURCE_DIR="${RUNNER_TEMP}/artifact-extract-${{ github.run_id }}-${{ github.run_attempt }}"
          mkdir -p "$SOURCE_DIR"
          unzip -q -o "$NORMALIZED_PATH" -d "$SOURCE_DIR"

          if [ $? -ne 0 ]; then
            echo "::error::Failed to extract archive"
            exit 1
          fi
        fi

        echo "Source directory: $SOURCE_DIR"
        echo "Contents of source:"
        ls -la "$SOURCE_DIR" || echo "Directory listing failed"

        # Count and copy distribution directories (security: only copy expected directories)
        # Only search in packages/, fixtures/, and e2e/ directories to avoid node_modules
        DIST_DIRS=0
        DIST_JS_DIRS=0
        TARGET_DIRS=0

        for search_dir in "packages" "fixtures" "e2e"; do
          if [ -d "$SOURCE_DIR/$search_dir" ]; then
            DIST_DIRS=$((DIST_DIRS + $(find "$SOURCE_DIR/$search_dir" -type d -path "*/dist" 2>/dev/null | wc -l)))
            DIST_JS_DIRS=$((DIST_JS_DIRS + $(find "$SOURCE_DIR/$search_dir" -type d -name "dist-js" 2>/dev/null | wc -l)))
            TARGET_DIRS=$((TARGET_DIRS + $(find "$SOURCE_DIR/$search_dir" -type d -name "target" 2>/dev/null | wc -l)))
          fi
        done

        echo "Found $DIST_DIRS dist directories, $DIST_JS_DIRS dist-js directories, $TARGET_DIRS target directories"

        if [ "$DIST_DIRS" -ge 1 ]; then
          echo "Copying dist directories to workspace..."
          for search_dir in "packages" "fixtures" "e2e"; do
            if [ -d "$SOURCE_DIR/$search_dir" ]; then
              find "$SOURCE_DIR/$search_dir" -type d -path "*/dist" 2>/dev/null | while read -r dir; do
                copy_directory "$dir" "${{ github.workspace }}"
              done
            fi
          done
        fi

        if [ "$DIST_JS_DIRS" -ge 1 ]; then
          echo "Copying dist-js directories to workspace..."
          for search_dir in "packages" "fixtures" "e2e"; do
            if [ -d "$SOURCE_DIR/$search_dir" ]; then
              find "$SOURCE_DIR/$search_dir" -type d -name "dist-js" 2>/dev/null | while read -r dir; do
                copy_directory "$dir" "${{ github.workspace }}"
              done
            fi
          done
        fi

        if [ "$TARGET_DIRS" -ge 1 ]; then
          echo "Copying target directories to workspace..."
          for search_dir in "packages" "fixtures" "e2e"; do
            if [ -d "$SOURCE_DIR/$search_dir" ]; then
              find "$SOURCE_DIR/$search_dir" -type d -name "target" 2>/dev/null | while read -r dir; do
                copy_directory "$dir" "${{ github.workspace }}"
              done
            fi
          done
        fi

        # Cleanup temporary extraction directory (only if we extracted a zip)
        if [ "${{ steps.cache-restore.outputs.cache-hit }}" != "true" ] && [ "${{ steps.download-artifact.outputs.extracted }}" != "true" ]; then
          rm -rf "$SOURCE_DIR"
          echo "Cleaned up temporary extraction directory"
        fi

        echo "success=true" >> $GITHUB_OUTPUT
