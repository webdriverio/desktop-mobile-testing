name: 'Download and Extract Artifacts'
description: 'Downloads and extracts compressed artifacts shared from previous jobs using GitHub cache (90-day retention)'

inputs:
  path:
    description: 'Destination directory to extract the artifact contents'
    required: true
  filename:
    description: 'Filename of the compressed artifact to download'
    required: true
    default: 'artifact.zip'
  name:
    description: 'Artifact name as used in the cache key'
    required: true
  cache_key_prefix:
    description: 'Prefix for the cache key (must match upload setting)'
    default: 'build-artifacts'
    required: false
  exact_cache_key:
    description: 'Exact cache key to use for retrieval (if provided)'
    required: false
  use_cache:
    description: 'Use cache only (true-only or false-only)'
    required: false

outputs:
  source_dir:
    description: 'Directory containing the extracted artifact contents'
    value: ${{ steps.get-artifact.outputs.source_dir }}

runs:
  using: 'composite'
  steps:
    - name: 📥 Get Artifact
      id: get-artifact
      shell: bash
      run: |
        # Generate cache key
        CACHE_PREFIX="${{ inputs.cache_key_prefix || 'artifacts' }}"
        NAME="${{ inputs.name }}"
        OS="${{ runner.os }}"
        RUN_ID="${{ github.run_id }}"

        # Handle rerun suffix
        RERUN_SUFFIX=""
        if [ "${{ github.run_attempt }}" -gt 1 ]; then
          RERUN_SUFFIX="-rerun${{ github.run_attempt }}"
        fi

        # Build cache key
        if [ -n "${{ inputs.exact_cache_key }}" ]; then
          CACHE_KEY="${{ inputs.exact_cache_key }}"
        else
          CACHE_KEY="${OS}-${CACHE_PREFIX}-${NAME}-${RUN_ID}${RERUN_SUFFIX}"
        fi

        echo "Using cache key: ${CACHE_KEY}"

        # Define paths
        ARCHIVE_PATH="${{ inputs.path }}/${{ inputs.filename }}"
        SOURCE_DIR="${RUNNER_TEMP}/artifact-source-${{ github.run_id }}-${{ github.run_attempt }}"
        mkdir -p "${SOURCE_DIR}"

        # Try cache restore first
        echo "Attempting cache restore..."
        # Note: We can't use actions/cache/restore in a composite script step,
        # so we check if the file exists from a previous cache restore in the workflow

        # Check if archive already exists (from cache)
        if [ -f "${ARCHIVE_PATH}" ]; then
          echo "Found cached archive at ${ARCHIVE_PATH}"

          # Verify and extract
          if unzip -t "${ARCHIVE_PATH}" > /dev/null 2>&1; then
            unzip -q -o "${ARCHIVE_PATH}" -d "${SOURCE_DIR}"
            echo "Extracted cached archive to ${SOURCE_DIR}"
          else
            echo "::error::Cached archive is corrupted"
            exit 1
          fi
        else
          echo "Cache miss - falling back to gh run download"

          # Check if cache-only mode
          if [ "${{ inputs.use_cache }}" = "true-only" ]; then
            echo "::error::Cache miss and use_cache=true-only, failing"
            exit 1
          fi

          # Download using gh CLI
          mkdir -p "${{ inputs.path }}"

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Download attempt $i of $MAX_RETRIES"
            if gh run download --name "${NAME}" --dir "${SOURCE_DIR}"; then
              echo "Successfully downloaded artifact"
              break
            fi

            if [ $i -eq $MAX_RETRIES ]; then
              echo "::error::Failed to download artifact after $MAX_RETRIES attempts"
              exit 1
            fi

            SLEEP_TIME=$((2 ** i))
            echo "Waiting ${SLEEP_TIME}s before retry..."
            sleep $SLEEP_TIME
          done

          # gh run download may extract directly OR download a zip file depending on how it was uploaded
          echo "Artifact downloaded by gh CLI"
        fi

        # Check if we have a zip file that needs extraction (gh run download sometimes returns zip)
        ZIP_FILE="${SOURCE_DIR}/artifact.zip"
        if [ -f "${ZIP_FILE}" ]; then
          echo "Found zip file in source directory, extracting..."
          # Create a temp directory for extraction
          EXTRACT_TEMP="${SOURCE_DIR}/.extract-temp"
          mkdir -p "${EXTRACT_TEMP}"

          # Extract the zip
          if unzip -q -o "${ZIP_FILE}" -d "${EXTRACT_TEMP}"; then
            echo "Extracted zip to temp directory"

            # Check if the zip contains a single root directory (common case)
            ROOT_ITEMS=$(ls -A "${EXTRACT_TEMP}")
            ROOT_ITEM_COUNT=$(echo "${ROOT_ITEMS}" | wc -l)

            if [ "${ROOT_ITEM_COUNT}" -eq 1 ] && [ -d "${EXTRACT_TEMP}/${ROOT_ITEMS}" ]; then
              # Single root directory - move contents up one level
              echo "Zip contains single root directory, flattening structure..."
              mv "${EXTRACT_TEMP}/${ROOT_ITEMS}"/* "${SOURCE_DIR}/" 2>/dev/null || true
              mv "${EXTRACT_TEMP}/${ROOT_ITEMS}"/.* "${SOURCE_DIR}/" 2>/dev/null || true
              rmdir "${EXTRACT_TEMP}/${ROOT_ITEMS}" 2>/dev/null || true
            else
              # Multiple items or files at root - move all to source dir
              echo "Moving extracted contents to source directory..."
              mv "${EXTRACT_TEMP}"/* "${SOURCE_DIR}/" 2>/dev/null || true
              mv "${EXTRACT_TEMP}"/.* "${SOURCE_DIR}/" 2>/dev/null || true
            fi

            # Clean up
            rm -rf "${EXTRACT_TEMP}"
            rm -f "${ZIP_FILE}"
            echo "Extraction complete"
          else
            echo "::error::Failed to extract zip file"
            exit 1
          fi
        fi

        # Verify we have content
        if [ ! -d "${SOURCE_DIR}" ] || [ -z "$(ls -A "${SOURCE_DIR}" 2>/dev/null)" ]; then
          echo "::error::No content found in source directory"
          exit 1
        fi

        echo "Contents of source directory:"
        ls -la "${SOURCE_DIR}"

        # Output the source directory
        echo "source_dir=${SOURCE_DIR}" >> $GITHUB_OUTPUT
        echo "::notice::Artifact ready at ${SOURCE_DIR}"
      env:
        GH_TOKEN: ${{ github.token }}

    - name: 📂 Copy to Workspace
      id: copy-to-workspace
      shell: bash
      run: |
        SOURCE_DIR="${{ steps.get-artifact.outputs.source_dir }}"
        WORKSPACE="${{ github.workspace }}"

        if [ ! -d "${SOURCE_DIR}" ]; then
          echo "::error::Source directory not found: ${SOURCE_DIR}"
          exit 1
        fi

        echo "Copying artifact contents to workspace..."
        echo "Source: ${SOURCE_DIR}"
        echo "Workspace: ${WORKSPACE}"

        # Find and copy dist/, dist-js/, and target/ directories
        for dir_pattern in "dist" "dist-js" "target"; do
          FOUND_DIRS=$(find "${SOURCE_DIR}" -type d -name "${dir_pattern}" 2>/dev/null | sort || true)

          if [ -n "${FOUND_DIRS}" ]; then
            echo "Found ${dir_pattern} directories:"
            echo "${FOUND_DIRS}"

            # Use process substitution to avoid subshell issues with variable scope
            while IFS= read -r src_dir; do
              [ -z "${src_dir}" ] && continue

              # Get relative path from source root
              rel_path="${src_dir#${SOURCE_DIR}/}"
              rel_path="${rel_path#./}"

              # Normalize path separators (handle Windows paths)
              rel_path=$(echo "${rel_path}" | sed 's|\\|/|g')

              target_dir="${WORKSPACE}/${rel_path}"
              parent_dir=$(dirname "${target_dir}")

              echo "  Processing: ${rel_path}"
              echo "    Source: ${src_dir}"
              echo "    Target: ${target_dir}"
              echo "    Parent: ${parent_dir}"

              # Create parent directory
              mkdir -p "${parent_dir}"

              # Copy directory contents
              if [ -d "${target_dir}" ]; then
                # Merge into existing directory
                echo "    Merging into existing directory..."
                cp -r "${src_dir}"/* "${target_dir}/" 2>/dev/null || {
                  echo "    Warning: Some files may not have copied (expected for symlinks)"
                }
              else
                # Copy entire directory
                echo "    Copying entire directory..."
                cp -r "${src_dir}" "${parent_dir}/"
              fi

              # Verify the copy worked
              if [ -d "${target_dir}" ]; then
                file_count=$(find "${target_dir}" -type f 2>/dev/null | wc -l)
                echo "    ✓ Copied ${rel_path} (${file_count} files)"
              else
                echo "    ✗ Failed to copy ${rel_path}"
              fi
            done <<< "${FOUND_DIRS}"
          else
            echo "No ${dir_pattern} directories found"
          fi
        done

        echo ""
        echo "Artifact copy complete. Verifying key directories..."

        # Verify results
        for verify_pattern in "dist" "dist-js" "target"; do
          verify_count=$(find "${WORKSPACE}" -type d -name "${verify_pattern}" 2>/dev/null | wc -l)
          echo "  ${verify_pattern} directories in workspace: ${verify_count}"
        done
