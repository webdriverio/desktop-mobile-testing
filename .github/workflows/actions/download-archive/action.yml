name: 'Download and Extract Artifacts'
description: 'Downloads and extracts compressed artifacts shared from previous jobs using GitHub cache (90-day retention)'
inputs:
  path:
    description: 'Destination directory to extract the artifact contents'
    required: true
  filename:
    description: 'Filename of the compressed artifact to download'
    required: true
    default: 'artifact.zip'
  name:
    description: 'Artifact name as used in the cache key'
    required: true
  cache_key_prefix:
    description: 'Prefix for the cache key (must match upload setting)'
    default: 'build-artifacts'
    required: false
  exact_cache_key:
    description: 'Exact cache key to use for retrieval (if provided)'
    required: false
  use_cache:
    description: 'Use cache only (true-only or false-only)'
    required: false

runs:
  using: 'composite'
  steps:
    # Check if this is a rerun of a previous workflow run
    - name: 🔄 Check for Rerun
      id: check-rerun
      shell: bash
      run: |
        if [ "${{ github.run_attempt }}" -gt 1 ]; then
          echo "rerun_suffix=-rerun${{ github.run_attempt }}" >> $GITHUB_OUTPUT
        else
          echo "rerun_suffix=" >> $GITHUB_OUTPUT
        fi

    # Generate standard cache keys
    - name: 🔑 Generate Cache Keys
      id: generate-keys
      shell: bash
      run: |
        # Ensure values have defaults
        CACHE_PREFIX="${{ inputs.cache_key_prefix || 'artifacts' }}"
        NAME="${{ inputs.name }}"
        OS="${{ runner.os }}"
        RUN_ID="${{ github.run_id }}"
        RERUN_SUFFIX="${{ steps.check-rerun.outputs.rerun_suffix }}"

        # Generate platform-specific key (no cross-platform sharing to avoid path issues)
        PLATFORM_KEY="${OS}-${CACHE_PREFIX}-${NAME}-${RUN_ID}${RERUN_SUFFIX}"
        echo "platform_key=${PLATFORM_KEY}" >> $GITHUB_OUTPUT

        # Generate standard key (os-specific) for backward compatibility
        STANDARD_KEY="${OS}-${CACHE_PREFIX}-${NAME}-${RUN_ID}${RERUN_SUFFIX}"
        echo "standard_key=${STANDARD_KEY}" >> $GITHUB_OUTPUT

        # Generate OS-agnostic key
        AGNOSTIC_KEY="${CACHE_PREFIX}-${NAME}-${RUN_ID}${RERUN_SUFFIX}"
        echo "agnostic_key=${AGNOSTIC_KEY}" >> $GITHUB_OUTPUT

        # Generate Linux-specific key for cross-OS compatibility
        LINUX_KEY="Linux-${CACHE_PREFIX}-${NAME}-${RUN_ID}${RERUN_SUFFIX}"
        echo "linux_key=${LINUX_KEY}" >> $GITHUB_OUTPUT

        # Generate pattern keys
        PATTERN_KEY="${OS}-${CACHE_PREFIX}-${NAME}-"
        echo "pattern_key=${PATTERN_KEY}" >> $GITHUB_OUTPUT

        # Generate OS-agnostic pattern
        AGNOSTIC_PATTERN="${CACHE_PREFIX}-${NAME}-"
        echo "agnostic_pattern=${AGNOSTIC_PATTERN}" >> $GITHUB_OUTPUT

        # Debug: Output the generated keys and inputs
        echo "Generated cache keys:"
        echo "  platform_key: ${PLATFORM_KEY}"
        echo "  standard_key: ${STANDARD_KEY}"
        echo "  linux_key: ${LINUX_KEY}"
        echo "  inputs.cache_key_prefix: ${{ inputs.cache_key_prefix }}"
        echo "  inputs.name: ${{ inputs.name }}"
        echo "  inputs.exact_cache_key: ${{ inputs.exact_cache_key }}"

    # Restore cache with exact key (if provided)
    # Normalize path for cache operations
    - name: 🔧 Normalize Path
      id: normalize-path
      shell: bash
      run: |
        # Normalize path separators for cross-platform compatibility
        NORMALIZED_PATH=$(echo "${{ inputs.path }}/${{ inputs.filename }}" | sed 's|\\|/|g')
        echo "normalized_path=$NORMALIZED_PATH" >> $GITHUB_OUTPUT

    # Restore cache with exact key (if provided)
    - name: 🗄️ Restore with Exact Key
      id: cache-restore-exact
      if: inputs.exact_cache_key != ''
      uses: actions/cache/restore@v4
      env:
        ACTIONS_CACHE_SERVICE_V2: 'true'
      with:
        path: ${{ steps.normalize-path.outputs.normalized_path }}
        key: ${{ inputs.exact_cache_key }}
        enableCrossOsArchive: true
        lookup-only: false
        fail-on-cache-miss: false

    # Restore with platform-specific key
    - name: 🗄️ Restore with Platform-Specific Key
      id: cache-restore-platform
      if: steps.cache-restore-exact.outputs.cache-hit != 'true'
      uses: actions/cache/restore@v4
      env:
        ACTIONS_CACHE_SERVICE_V2: 'true'
      with:
        path: ${{ steps.normalize-path.outputs.normalized_path }}
        key: ${{ steps.generate-keys.outputs.platform_key }}
        enableCrossOsArchive: true
        lookup-only: false
        fail-on-cache-miss: false

    # Restore with Linux key for cross-OS compatibility
    - name: 🗄️ Restore with Linux Key
      id: cache-restore-linux
      if: steps.cache-restore-exact.outputs.cache-hit != 'true' && steps.cache-restore-platform.outputs.cache-hit != 'true' && runner.os != 'Linux'
      uses: actions/cache/restore@v4
      env:
        ACTIONS_CACHE_SERVICE_V2: 'true'
      with:
        path: ${{ steps.normalize-path.outputs.normalized_path }}
        key: ${{ steps.generate-keys.outputs.linux_key }}
        enableCrossOsArchive: true
        lookup-only: false
        fail-on-cache-miss: false

    # Try OS-specific pattern as fallback (finds latest matching cache)
    - name: 🗄️ Restore with Pattern
      id: cache-restore-pattern
      if: steps.cache-restore-exact.outputs.cache-hit != 'true' && steps.cache-restore-platform.outputs.cache-hit != 'true' && steps.cache-restore-linux.outputs.cache-hit != 'true'
      uses: actions/cache/restore@v4
      env:
        ACTIONS_CACHE_SERVICE_V2: 'true'
      with:
        path: ${{ steps.normalize-path.outputs.normalized_path }}
        key: ${{ steps.generate-keys.outputs.pattern_key || format('{0}-{1}-{2}-', runner.os, inputs.cache_key_prefix, inputs.name) }}
        restore-keys: |
          ${{ steps.generate-keys.outputs.pattern_key || format('{0}-{1}-{2}-', runner.os, inputs.cache_key_prefix, inputs.name) }}
        enableCrossOsArchive: true
        lookup-only: false
        fail-on-cache-miss: false

    # Handle cache miss
    - name: ⚠️ Handle Cache Miss
      if: steps.cache-restore-exact.outputs.cache-hit != 'true' && steps.cache-restore-platform.outputs.cache-hit != 'true' && steps.cache-restore-linux.outputs.cache-hit != 'true' && steps.cache-restore-pattern.outputs.cache-hit != 'true'
      shell: bash
      run: |
        if [ -n "${{ inputs.use_cache }}" ] && [ "${{ inputs.use_cache }}" = "true-only" ]; then
          echo "::error::Cache miss and use_cache=true-only, failing step"
          echo "success=false" >> $GITHUB_OUTPUT
          exit 1
        else
          echo "::warning::Falling back to artifact download"
          echo "success=false" >> $GITHUB_OUTPUT
        fi

    # Verify the downloaded file and print minimal but useful info
    - name: 🔍 Verify Downloaded File
      id: verify-file
      shell: bash
      run: |
        # Summary of what method was used to get the file (for debugging)
        if [ "${{ steps.cache-restore-exact.outputs.cache-hit }}" == "true" ]; then
          SOURCE="exact key cache"
        elif [ "${{ steps.cache-restore-platform.outputs.cache-hit }}" == "true" ]; then
          SOURCE="platform-specific key cache"
        elif [ "${{ steps.cache-restore-linux.outputs.cache-hit }}" == "true" ]; then
          SOURCE="Linux key cache"
        elif [ "${{ steps.cache-restore-pattern.outputs.cache-hit }}" == "true" ]; then
          SOURCE="pattern key cache"
        else
          SOURCE="GitHub artifact (fallback)"
        fi

        # Check if file exists and get size
        FILE_PATH="${{ inputs.path }}/${{ inputs.filename }}"
        NORMALIZED_FILE_PATH=$(echo "$FILE_PATH" | sed 's|\\|/|g')

        if [ -f "$NORMALIZED_FILE_PATH" ]; then
          FILE_SIZE=$(stat -c%s "$NORMALIZED_FILE_PATH" 2>/dev/null || stat -f%z "$NORMALIZED_FILE_PATH" 2>/dev/null || ls -l "$NORMALIZED_FILE_PATH" | awk '{print $5}')
          HUMAN_SIZE=$(du -h "$NORMALIZED_FILE_PATH" | cut -f1)

          # Test zip file integrity
          unzip -t "$NORMALIZED_FILE_PATH" > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            ZIP_VALID="VALID"
          else
            ZIP_VALID="INVALID"
          fi

          # Only output essential information
          echo "::notice::Downloaded ${{ inputs.name }} from ${SOURCE}: ${HUMAN_SIZE}, integrity: ${ZIP_VALID}"

          echo "size=${FILE_SIZE}" >> $GITHUB_OUTPUT
          echo "valid=${ZIP_VALID}" >> $GITHUB_OUTPUT
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
        else
          echo "::error::File not found: $NORMALIZED_FILE_PATH"
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "success=false" >> $GITHUB_OUTPUT
          exit 1
        fi

    # Download from GitHub Artifacts as fallback
    - name: 📥 Download from GitHub Artifacts
      id: download-artifact
      if: steps.verify-file.outputs.exists != 'true' && inputs.use_cache != 'true-only'
      shell: bash
      run: |
        # Create directory for artifact
        mkdir -p "${{ inputs.path }}"

        # Download artifact with retries
        MAX_RETRIES=3
        for i in $(seq 1 $MAX_RETRIES); do
          # Download with automatic retry
          echo "Attempt $i of $MAX_RETRIES"
          gh run download --name "${{ inputs.name }}" --dir "${{ inputs.path }}" && break

          # Exit on final attempt failure
          if [ $i -eq $MAX_RETRIES ]; then
            echo "::error::Failed to download artifact after $MAX_RETRIES attempts"
            exit 1
          fi

          # Wait with exponential backoff
          SLEEP_TIME=$((2 ** $i))
          echo "Waiting ${SLEEP_TIME}s before retry..."
          sleep $SLEEP_TIME
        done

        # Check what was downloaded
        NORMALIZED_PATH=$(echo "${{ inputs.path }}" | sed 's|\\|/|g')
        echo "Contents of download directory:"
        ls -la "$NORMALIZED_PATH" || echo "Directory listing failed"

        # Check if expected directories exist (gh run download extracts contents directly)
        if [ -d "$NORMALIZED_PATH/packages" ] || [ -d "$NORMALIZED_PATH/fixtures" ]; then
          echo "Artifact contents extracted directly to directory"
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
          echo "extracted=true" >> $GITHUB_OUTPUT
          echo "::notice::Successfully downloaded and extracted ${{ inputs.name }} from GitHub Artifacts"
          exit 0
        fi

        # Otherwise, look for a zip file
        EXPECTED_PATH="$NORMALIZED_PATH/${{ inputs.filename }}"
        if [ -f "$EXPECTED_PATH" ]; then
          echo "Found artifact at expected path: $EXPECTED_PATH"
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
          echo "extracted=false" >> $GITHUB_OUTPUT
          echo "::notice::Successfully downloaded ${{ inputs.name }} from GitHub Artifacts"
          exit 0
        fi

        # Search for any zip file
        ZIP_FILES=$(find "$NORMALIZED_PATH" -type f -name "*.zip" 2>/dev/null | sort)
        FIRST_ZIP=$(echo "$ZIP_FILES" | head -n 1)

        if [ -n "$FIRST_ZIP" ]; then
          echo "Found zip file: $FIRST_ZIP"
          if [ "$FIRST_ZIP" != "$EXPECTED_PATH" ]; then
            mv "$FIRST_ZIP" "$EXPECTED_PATH"
          fi
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "success=true" >> $GITHUB_OUTPUT
          echo "extracted=false" >> $GITHUB_OUTPUT
          echo "::notice::Successfully downloaded ${{ inputs.name }} from GitHub Artifacts"
          exit 0
        fi

        echo "::error::Failed to find downloaded artifact or extracted contents"
        echo "valid=false" >> $GITHUB_OUTPUT
        echo "success=false" >> $GITHUB_OUTPUT
        exit 1
      env:
        GH_TOKEN: ${{ github.token }}

    # Extract the compressed artifact to the destination
    - name: 📂 Extract Compressed Archive
      id: extract-archive
      if: steps.verify-file.outputs.exists == 'true' || steps.download-artifact.outputs.valid == 'true'
      shell: bash
      run: |
        # Check if artifact was already extracted by gh run download
        if [ "${{ steps.download-artifact.outputs.extracted }}" == "true" ]; then
          echo "Artifact was already extracted by gh run download, copying to workspace..."
          EXTRACT_DIR="${{ inputs.path }}"
        else
          # Ensure the archive exists
          ARCHIVE_PATH="${{ inputs.path }}/${{ inputs.filename }}"
          if [ ! -f "$ARCHIVE_PATH" ]; then
            echo "::error::Archive not found for extraction: $ARCHIVE_PATH"
            exit 1
          fi

          # Normalize path separators for cross-platform compatibility
          NORMALIZED_PATH=$(echo "$ARCHIVE_PATH" | sed 's|\\|/|g')

          # Security: Extract to a temporary directory to prevent artifact poisoning
          # This prevents malicious artifacts from overwriting critical files in the workspace
          EXTRACT_DIR="${RUNNER_TEMP}/artifact-extract-${{ github.run_id }}-${{ github.run_attempt }}"
          mkdir -p "$EXTRACT_DIR"
          unzip -q -o "$NORMALIZED_PATH" -d "$EXTRACT_DIR"

          # Check extraction success
          if [ $? -ne 0 ]; then
            echo "::error::Failed to extract archive"
            exit 1
          fi
        fi

        # Count distribution directories, dist-js directories, and target directories in the extraction directory
        DIST_DIRS=$(find "$EXTRACT_DIR" -type d -path "*/dist" 2>/dev/null | sort | wc -l)
        DIST_JS_DIRS=$(find "$EXTRACT_DIR" -type d -name "dist-js" 2>/dev/null | sort | wc -l)
        TARGET_DIRS=$(find "$EXTRACT_DIR" -type d -name "target" 2>/dev/null | sort | wc -l)

        # Security: Only copy expected directories to workspace
        # This prevents malicious artifacts from overwriting package.json, scripts, etc.

        # Copy dist directories to workspace
        if [ "$DIST_DIRS" -ge 1 ]; then
          echo "Copying dist directories to workspace..."
          find "$EXTRACT_DIR" -type d -path "*/dist" 2>/dev/null | while read -r dist_dir; do
            # Get the relative path from the extraction root
            rel_path="${dist_dir#$EXTRACT_DIR/}"
            # Remove leading ./ if present
            rel_path="${rel_path#./}"
            # Convert Windows-style paths to Unix-style for consistent handling
            rel_path=$(echo "$rel_path" | sed 's|\\|/|g')
            target_dir="${{ github.workspace }}/$rel_path"

            # Create parent directory if it doesn't exist
            parent_dir=$(dirname "$target_dir")
            if [ ! -d "$parent_dir" ]; then
              mkdir -p "$parent_dir"
            fi

            # Copy dist directory contents to workspace
            if [ -d "$target_dir" ]; then
              # Merge: copy contents into existing dist directory
              cp -r "$dist_dir"/* "$target_dir/" 2>/dev/null || true
            else
              # Create new dist directory
              cp -r "$dist_dir" "$parent_dir/"
            fi
            echo "  ✓ Copied $rel_path"
          done
        fi

        # Copy dist-js directories to workspace (for Tauri plugin JS builds)
        if [ "$DIST_JS_DIRS" -ge 1 ]; then
          echo "Copying dist-js directories to workspace..."
          find "$EXTRACT_DIR" -type d -name "dist-js" 2>/dev/null | while read -r dist_js_dir; do
            # Get the relative path from the extraction root
            rel_path="${dist_js_dir#$EXTRACT_DIR/}"
            # Remove leading ./ if present
            rel_path="${rel_path#./}"
            # Convert Windows-style paths to Unix-style for consistent handling
            rel_path=$(echo "$rel_path" | sed 's|\\|/|g')
            target_dir="${{ github.workspace }}/$rel_path"

            # Create parent directory if it doesn't exist
            parent_dir=$(dirname "$target_dir")
            if [ ! -d "$parent_dir" ]; then
              mkdir -p "$parent_dir"
            fi

            # Copy dist-js directory contents to workspace
            if [ -d "$target_dir" ]; then
              # Merge: copy contents into existing dist-js directory
              cp -r "$dist_js_dir"/* "$target_dir/" 2>/dev/null || true
            else
              # Create new dist-js directory
              cp -r "$dist_js_dir" "$parent_dir/"
            fi
            echo "  ✓ Copied $rel_path"
          done
        fi

        # Copy target directories to workspace (for Tauri/Rust builds)
        if [ "$TARGET_DIRS" -ge 1 ]; then
          echo "Copying target directories to workspace..."
          find "$EXTRACT_DIR" -type d -name "target" 2>/dev/null | while read -r target_dir; do
            # Get the relative path from the extraction root
            rel_path="${target_dir#$EXTRACT_DIR/}"
            # Remove leading ./ if present
            rel_path="${rel_path#./}"
            # Convert Windows-style paths to Unix-style for consistent handling
            rel_path=$(echo "$rel_path" | sed 's|\\|/|g')
            dest_dir="${{ github.workspace }}/$rel_path"

            # Create parent directory if it doesn't exist
            parent_dir=$(dirname "$dest_dir")
            if [ ! -d "$parent_dir" ]; then
              mkdir -p "$parent_dir"
            fi

            # Copy target directory contents to workspace
            if [ -d "$dest_dir" ]; then
              # Merge: copy contents into existing target directory
              cp -r "$target_dir"/* "$dest_dir/" 2>/dev/null || true
            else
              # Create new target directory
              cp -r "$target_dir" "$parent_dir/"
            fi
            echo "  ✓ Copied $rel_path"
          done
        fi

        # Cleanup: Remove temporary extraction directory (only if we extracted a zip)
        if [ "${{ steps.download-artifact.outputs.extracted }}" != "true" ]; then
          rm -rf "$EXTRACT_DIR"
          echo "Cleaned up temporary extraction directory"
        fi

        # Return success
        echo "success=true" >> $GITHUB_OUTPUT
