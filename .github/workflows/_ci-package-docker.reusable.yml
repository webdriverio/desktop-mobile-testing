name: Package (Docker)
description: 'Runs Tauri package tests in Docker containers across different Linux distributions'

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      distro:
        description: 'Linux distribution to test (ubuntu, fedora, debian, arch, void)'
        type: string
        required: true

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  package-docker:
    name: ${{ inputs.distro }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run tests using test.sh
        run: |
          cd fixtures/package-tests/tauri-app/docker
          ./test.sh ${{ inputs.distro }} test

      - name: Copy logs to workspace
        run: |
          # Copy Docker test logs to workspace for upload
          mkdir -p fixtures/package-tests/tauri-app/logs-docker/
          cp /tmp/docker-test-${{ inputs.distro }}.log fixtures/package-tests/tauri-app/logs-docker/ 2>/dev/null || true
          # Copy any test logs that were captured
          cp -r /tmp/tauri-test-logs-${{ inputs.distro }}/* fixtures/package-tests/tauri-app/logs-docker/ 2>/dev/null || true

      - name: Upload test results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ inputs.distro }}
          path: fixtures/package-tests/**/logs-*/
          retention-days: 7
          if-no-files-found: warn
