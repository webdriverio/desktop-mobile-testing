name: Release

# Automated releases trigger after CI completes on main. Release commits
# contain [skip ci] so GitHub skips CI for them entirely, breaking the loop.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      scope:
        description: 'Release scope'
        required: true
        type: choice
        options:
          - electron
          - tauri
          - shared
        default: electron
      release_version:
        description: 'Release version type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
        default: patch
      dry_run:
        description: 'Dry run (show what would happen without publishing)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  release-auto:
    name: Release (Auto)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      # Build all packages - releasekit will filter by scope labels from the merged PR
      # defaultScope in config ensures shared packages are released if no scope label found
      target_packages: '@wdio/electron-service,@wdio/electron-cdp-bridge,@wdio/tauri-service,@wdio/tauri-plugin,@wdio/native-utils,@wdio/native-types'
      target_branch: main
      bump: minor
      dry_run: false
      scope: shared
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      crates_io_token: ${{ secrets.CRATES_IO_TOKEN }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}

  resolve-manual:
    name: Resolve Release Parameters
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      target_packages: ${{ steps.map.outputs.packages }}
    steps:
      - name: Validate repository
        run: |
          if [ "${{ github.repository }}" != "webdriverio/desktop-mobile" ]; then
            echo "::error::This workflow must run in webdriverio/desktop-mobile"
            exit 1
          fi

      - name: Map scope to packages
        id: map
        run: |
          case "${{ inputs.scope }}" in
            electron)
              echo "packages=@wdio/electron-service,@wdio/electron-cdp-bridge,@wdio/native-utils,@wdio/native-types" >> "$GITHUB_OUTPUT"
              ;;
            tauri)
              echo "packages=@wdio/tauri-service,@wdio/tauri-plugin,@wdio/native-utils,@wdio/native-types" >> "$GITHUB_OUTPUT"
              ;;
            shared)
              echo "packages=@wdio/native-types,@wdio/native-utils" >> "$GITHUB_OUTPUT"
              ;;
          esac

  release-manual:
    name: Release (Manual)
    needs: resolve-manual
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      target_packages: ${{ needs.resolve-manual.outputs.target_packages }}
      target_branch: main
      bump: ${{ inputs.release_version }}
      dry_run: ${{ inputs.dry_run }}
      scope: ${{ inputs.scope }}
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      crates_io_token: ${{ secrets.CRATES_IO_TOKEN }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}
