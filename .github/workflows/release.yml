name: Release

permissions:
  contents: write
  actions: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to release'
        required: true
        type: choice
        options:
          - electron
          - tauri
        default: electron
      release_version:
        description: 'Release version type (pre* options for pre-releases)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
        default: patch
      dry_run:
        description: 'Dry run (show what would happen without publishing)'
        required: false
        type: boolean
        default: false

jobs:
  resolve:
    name: Resolve release parameters
    runs-on: ubuntu-latest
    outputs:
      target_packages: ${{ steps.map.outputs.packages }}

    steps:
      - name: Validate repository
        run: |
          if [ "${{ github.repository }}" != "webdriverio/desktop-mobile" ]; then
            echo "::error::This workflow must run in webdriverio/desktop-mobile"
            exit 1
          fi

      - name: Map service to packages
        id: map
        run: |
          case "${{ inputs.service }}" in
            electron)
              echo "packages=@wdio/electron-service,@wdio/electron-cdp-bridge,@wdio/native-utils,@wdio/native-types" >> "$GITHUB_OUTPUT"
              ;;
            tauri)
              echo "packages=@wdio/tauri-service,@wdio/tauri-plugin,@wdio/native-utils,@wdio/native-types" >> "$GITHUB_OUTPUT"
              ;;
          esac

  release:
    needs: resolve
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      target_packages: ${{ needs.resolve.outputs.target_packages }}
      target_branch: main
      bump: ${{ inputs.release_version }}
      dry_run: ${{ inputs.dry_run }}
      scope: ${{ inputs.service }}
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      crates_io_token: ${{ secrets.CRATES_IO_TOKEN }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}
