name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      scope:
        description: "Release scope (electron, tauri, utils, types, spy, shared)"
        required: true
        type: choice
        options:
          - shared
          - utils
          - types
          - spy
          - electron
          - tauri
        default: shared
      bump:
        description: "Version increment"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
        default: patch
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - prerelease
        default: stable
      target_branch:
        description: "Branch to release from (default: main)"
        required: false
        type: string
        default: main
      dry_run:
        description: "Dry run (show what would happen without publishing)"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: read
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    outputs:
      should_release: ${{ steps.gate.outputs.should-release }}
      bump: ${{ steps.gate.outputs.bump }}
      scope: ${{ steps.gate.outputs.gate-scope }}
      target: ${{ steps.gate.outputs.gate-target }}
      stable: ${{ steps.gate.outputs.gate-stable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run ReleaseKit Gate
        id: gate
        uses: goosewobbler/releasekit@v0.17.0
        with:
          mode: gate
          node-version: '24'
          project-dir: .
          branch: main
          json: "true"
          summary: "true"
          skip-checkout: 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}

  release-auto:
    name: Release (Auto)
    needs: [gate]
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && needs.gate.outputs.should_release == 'true'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      target_packages: ${{ needs.gate.outputs.target }}
      target_branch: main
      bump: ${{ needs.gate.outputs.bump }}
      stable: ${{ needs.gate.outputs.stable }}
      release_type: ${{ needs.gate.outputs.stable == 'true' && 'stable' || 'prerelease' }}
      dry_run: false
      scope: ${{ needs.gate.outputs.scope }}
    secrets:
      ssh_key: ${{ secrets.DEPLOY_KEY }}
      crates_io_token: ${{ secrets.CRATES_IO_TOKEN }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}

  release-manual:
    name: Release (Manual)
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      target_branch: ${{ inputs.target_branch }}
      bump: ${{ inputs.bump }}
      stable: 'false'
      release_type: ${{ inputs.release_type }}
      dry_run: ${{ inputs.dry_run }}
      scope: ${{ inputs.scope }}
    secrets:
      ssh_key: ${{ secrets.DEPLOY_KEY }}
      crates_io_token: ${{ secrets.CRATES_IO_TOKEN }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}
