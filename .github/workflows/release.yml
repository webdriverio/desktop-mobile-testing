name: Release

# Automated releases trigger after CI completes on main. Release commits
# contain [skip ci] so GitHub skips CI for them entirely, breaking the loop.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      scope:
        description: 'Release scope'
        required: true
        type: choice
        options:
          - electron
          - tauri
          - shared
        default: electron
      release_version:
        description: 'Release version type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
        default: patch
      dry_run:
        description: 'Dry run (show what would happen without publishing)'
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  # Check if a release should run based on merged PR labels
  check-release:
    name: Check Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Check for release labels
        id: check
        run: |
          # Get the SHA that was pushed
          SHA="${{ github.event.workflow_run.head_sha }}"

          # Find the PR that was merged
          PR_DATA=$(gh api graphql -f query='
            query($sha: String!) {
              commit(sha: $sha) {
                associatedPullRequests(first: 1) {
                  nodes {
                    number
                    labels(first: 20) {
                      nodes { name }
                    }
                  }
                }
              }
            }
          ' -f sha="$SHA" 2>/dev/null)

          # Check for release labels
          LABELS=$(echo "$PR_DATA" | jq -r '.data.commit.associatedPullRequests.nodes[0].labels.nodes[].name' 2>/dev/null | tr '\n' ' ')

          echo "PR Labels: $LABELS"

          if echo "$LABELS" | grep -qE "(^| )bump:(patch|minor|major)( |$)"; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Release label found"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release label found"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}

  release-auto:
    name: Release (Auto)
    runs-on: ubuntu-latest
    needs: [check-release]
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      # Build all packages - releasekit will filter by scope labels from the merged PR
      # defaultScope in config ensures shared packages are released if no scope label found
      target_packages: '@wdio/electron-service,@wdio/electron-cdp-bridge,@wdio/tauri-service,@wdio/tauri-plugin,@wdio/native-utils,@wdio/native-types'
      target_branch: main
      bump: auto
      dry_run: false
      scope: shared
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      crates_io_token: ${{ secrets.CRATES_IO_TOKEN }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}

  resolve-manual:
    name: Resolve Release Parameters
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      target_packages: ${{ steps.map.outputs.packages }}
    steps:
      - name: Validate repository
        run: |
          if [ "${{ github.repository }}" != "webdriverio/desktop-mobile" ]; then
            echo "::error::This workflow must run in webdriverio/desktop-mobile"
            exit 1
          fi

      - name: Map scope to packages
        id: map
        run: |
          case "${{ inputs.scope }}" in
            electron)
              echo "packages=@wdio/electron-service,@wdio/electron-cdp-bridge,@wdio/native-utils,@wdio/native-types" >> "$GITHUB_OUTPUT"
              ;;
            tauri)
              echo "packages=@wdio/tauri-service,@wdio/tauri-plugin,@wdio/native-utils,@wdio/native-types" >> "$GITHUB_OUTPUT"
              ;;
            shared)
              echo "packages=@wdio/native-types,@wdio/native-utils" >> "$GITHUB_OUTPUT"
              ;;
          esac

  release-manual:
    name: Release (Manual)
    needs: resolve-manual
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      target_packages: ${{ needs.resolve-manual.outputs.target_packages }}
      target_branch: main
      bump: ${{ inputs.release_version }}
      dry_run: ${{ inputs.dry_run }}
      scope: ${{ inputs.scope }}
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      crates_io_token: ${{ secrets.CRATES_IO_TOKEN }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}
