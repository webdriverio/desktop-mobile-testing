name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**/*.md'
  pull_request:
    # Doc-only PRs still trigger CI but use lint-only mode via detect-changes
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Run all tests (ignore change detection)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: 1
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # Detect which services are affected by changes
  detect-changes:
    uses: ./.github/workflows/_ci-detect-changes.reusable.yml
    with:
      force_all: ${{ inputs.force_all || false }}

  # Build on Linux first since it's the fastest and its artifacts are used by all other jobs
  # Skip build when only docs changed
  build:
    name: Build [Linux]
    needs: [detect-changes]
    if: needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build.reusable.yml
    secrets: inherit
    with:
      os: 'ubuntu-latest'

  # Run linting - doesn't need build artifacts
  lint:
    name: Lint [Linux]
    needs: [detect-changes]
    uses: ./.github/workflows/_ci-lint.reusable.yml
    secrets: inherit

  # Run unit tests - skip when only docs changed
  unit-matrix:
    name: Unit
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            display-name: Linux
          - os: windows-latest
            display-name: Windows
          - os: macos-latest
            display-name: macOS-ARM
          - os: macos-15-intel
            display-name: macOS-Intel
    uses: ./.github/workflows/_ci-unit.reusable.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  # Build Tauri E2E app binaries - only if Tauri tests will run
  build-tauri-e2e-app-linux:
    name: Build Tauri E2E App [Linux]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build-tauri-e2e-app.reusable.yml
    secrets: inherit
    with:
      os: 'ubuntu-latest'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  build-tauri-e2e-app-windows:
    name: Build Tauri E2E App [Windows]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build-tauri-e2e-app.reusable.yml
    secrets: inherit
    with:
      os: 'windows-latest'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  build-tauri-e2e-app-macos-arm:
    name: Build Tauri E2E App [macOS-ARM]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build-tauri-e2e-app.reusable.yml
    secrets: inherit
    with:
      os: 'macos-latest'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  build-tauri-e2e-app-macos-intel:
    name: Build Tauri E2E App [macOS-Intel]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build-tauri-e2e-app.reusable.yml
    secrets: inherit
    with:
      os: 'macos-15-intel'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  # Build Tauri package test apps - only if Tauri package tests will run
  build-tauri-package-app-linux:
    name: Build Tauri Package Test App [Linux]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build-tauri-package-app.reusable.yml
    secrets: inherit
    with:
      os: 'ubuntu-latest'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  build-tauri-package-app-windows:
    name: Build Tauri Package Test App [Windows]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build-tauri-package-app.reusable.yml
    secrets: inherit
    with:
      os: 'windows-latest'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  build-tauri-package-app-linux-arm:
    name: Build Tauri Package Test App [Linux-ARM64]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-build-tauri-package-app.reusable.yml
    secrets: inherit
    with:
      os: 'ubuntu-24.04-arm'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  # Run package tests after unit tests to ensure the package is built correctly
  # Split Electron and Tauri tests across separate jobs for better parallelization and clarity
  # Electron apps are built inline on the test runner (faster builds, Turbo caching handles it)
  # Tauri apps are built separately due to longer build times and system dependencies
  # Electron package tests are split by module type (CJS/ESM) for better error isolation
  package-electron-matrix:
    name: Package - Electron
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_electron == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            display-name: Linux
            module-type: cjs
          - os: ubuntu-latest
            display-name: Linux
            module-type: esm
          - os: windows-latest
            display-name: Windows
            module-type: cjs
          - os: windows-latest
            display-name: Windows
            module-type: esm
          - os: macos-latest
            display-name: macOS-ARM
            module-type: cjs
          - os: macos-latest
            display-name: macOS-ARM
            module-type: esm
          - os: macos-15-intel
            display-name: macOS-Intel
            module-type: cjs
          - os: macos-15-intel
            display-name: macOS-Intel
            module-type: esm
          # Forward-compat coverage: catches macOS 26 regressions before
          # `macos-latest` aliases to it. The `check-macos-alias-overlap` job
          # below auto-fails when this becomes redundant.
          - os: macos-26
            display-name: macOS-26
            module-type: esm
    uses: ./.github/workflows/_ci-package.reusable.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      service: 'electron'
      module-type: ${{ matrix.module-type }}
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  # macOS alias-overlap guard
  # The `package-electron-matrix` includes a dedicated `macos-26` row to catch
  # macOS 26 regressions before `macos-latest` aliases to that version. When
  # GitHub eventually flips the alias, the dedicated row becomes redundant.
  # These three jobs detect that automatically: each `detect-*` job emits the
  # major OS version of its runner, and `check-macos-alias-overlap` fails with
  # a clear remediation message if the majors match.
  detect-macos-latest-version:
    name: Detect - macos-latest OS major
    runs-on: macos-latest
    outputs:
      major: ${{ steps.detect.outputs.major }}
    steps:
      - name: Detect macOS major version
        id: detect
        shell: bash
        run: |
          MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          echo "macos-latest reports macOS $MAJOR.x"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

  detect-macos-26-version:
    name: Detect - macos-26 OS major
    runs-on: macos-26
    outputs:
      major: ${{ steps.detect.outputs.major }}
    steps:
      - name: Detect macOS major version
        id: detect
        shell: bash
        run: |
          MAJOR=$(sw_vers -productVersion | cut -d. -f1)
          echo "macos-26 reports macOS $MAJOR.x"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

  check-macos-alias-overlap:
    name: Check - macOS alias overlap
    needs: [detect-macos-latest-version, detect-macos-26-version]
    runs-on: ubuntu-latest
    steps:
      - name: Verify macos-latest does not alias to macos-26
        shell: bash
        env:
          LATEST_MAJOR: ${{ needs.detect-macos-latest-version.outputs.major }}
          PINNED_MAJOR: ${{ needs.detect-macos-26-version.outputs.major }}
        run: |
          echo "macos-latest major: $LATEST_MAJOR"
          echo "macos-26    major: $PINNED_MAJOR"
          if [ "$LATEST_MAJOR" = "$PINNED_MAJOR" ]; then
            echo "::error::macos-latest now aliases to macOS $LATEST_MAJOR — the dedicated macos-26 row in package-electron-matrix is redundant. Remove the macos-26 row from .github/workflows/ci.yml AND remove this alias-overlap guard (detect-macos-latest-version, detect-macos-26-version, check-macos-alias-overlap)."
            exit 1
          fi
          echo "Not redundant — macos-26 row still provides forward-compat coverage."

  package-tauri-linux:
    name: Package - Tauri [Linux]
    needs: [detect-changes, build, build-tauri-package-app-linux]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-package.reusable.yml
    secrets: inherit
    with:
      os: 'ubuntu-latest'
      service: 'tauri'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}
      tauri_cache_key: ${{ needs.build-tauri-package-app-linux.outputs.cache_key }}

  package-tauri-windows:
    name: Package - Tauri [Windows]
    needs: [detect-changes, build, build-tauri-package-app-windows]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-package.reusable.yml
    secrets: inherit
    with:
      os: 'windows-latest'
      service: 'tauri'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}
      tauri_cache_key: ${{ needs.build-tauri-package-app-windows.outputs.cache_key }}

  package-tauri-linux-arm:
    name: Package - Tauri [Linux-ARM64]
    needs: [detect-changes, build, build-tauri-package-app-linux-arm]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    uses: ./.github/workflows/_ci-package.reusable.yml
    secrets: inherit
    with:
      os: 'ubuntu-24.04-arm'
      service: 'tauri'
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}
      tauri_cache_key: ${{ needs.build-tauri-package-app-linux-arm.outputs.cache_key }}

  # Run Tauri package tests across different Linux distributions using Docker
  # Tests cross-distro compatibility, tauri-driver auto-installation, and WebKitWebDriver detection
  # Excluded distributions:
  # - SUSE: No official WebKitWebDriver package (requires multi-hour source build)
  # - Alpine: musl/static linking incompatible with GTK/webkit (no static libraries available)
  # - CentOS Stream 9: glib 2.68 too old (Tauri requires >= 2.70)
  # - CentOS Stream 10: WebKitGTK removed by Red Hat due to 200+ CVEs and unsustainable maintenance
  package-tauri-distros:
    name: Package - Tauri (Docker)
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            display-name: Ubuntu
          - distro: fedora
            display-name: Fedora
          - distro: debian
            display-name: Debian
          - distro: arch
            display-name: Arch
          - distro: void
            display-name: Void
    uses: ./.github/workflows/_ci-package-docker.reusable.yml
    secrets: inherit
    with:
      distro: ${{ matrix.distro }}

  # Run build tests outside of the main Linux build job
  build-matrix:
    name: Build
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_electron == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            display-name: Windows
          - os: macos-latest
            display-name: macOS-ARM
          - os: macos-15-intel
            display-name: macOS-Intel
    uses: ./.github/workflows/_ci-build.reusable.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}

  # E2E test matrix strategy:
  # - Run tests across operating systems and architectures (Linux, Windows, macOS ARM, macOS Intel)
  # - Test 3 scenarios (builder, forge, script)
  # - E2E tests use ESM only (CJS/ESM testing is done in package tests)
  # - Optimize for GitHub Actions concurrency limits
  e2e-matrix:
    name: E2E - Electron
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_electron == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            display-name: Linux
            scenario: builder
          - os: ubuntu-latest
            display-name: Linux
            scenario: forge
          - os: ubuntu-latest
            display-name: Linux
            scenario: script
          - os: windows-latest
            display-name: Windows
            scenario: builder
          - os: windows-latest
            display-name: Windows
            scenario: forge
          - os: windows-latest
            display-name: Windows
            scenario: script
          - os: macos-latest
            display-name: macOS-ARM
            scenario: builder
          - os: macos-latest
            display-name: macOS-ARM
            scenario: forge
          - os: macos-latest
            display-name: macOS-ARM
            scenario: script
          - os: macos-15-intel
            display-name: macOS-Intel
            scenario: builder
          - os: macos-15-intel
            display-name: macOS-Intel
            scenario: forge
          - os: macos-15-intel
            display-name: macOS-Intel
            scenario: script
    uses: ./.github/workflows/_ci-e2e.reusable.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      node-version: '24'
      scenario: ${{ matrix.scenario }}
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  # Electron window tests - run on Linux with splash screen enabled
  e2e-electron-window:
    name: E2E - Electron [Linux] (window)
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_electron == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            display-name: Linux
            scenario: builder
          - os: ubuntu-latest
            display-name: Linux
            scenario: forge
          - os: ubuntu-latest
            display-name: Linux
            scenario: script
    uses: ./.github/workflows/_ci-e2e.reusable.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      node-version: '24'
      scenario: ${{ matrix.scenario }}
      variant: window
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}

  # Tauri E2E tests - all providers (official, embedded, CrabNebula) run sequentially per runner
  # This consolidation reduces runner count from 56 to 20 for Tauri E2E tests
  # Official provider is automatically skipped on macOS (WKWebView limitations)
  e2e-tauri-linux:
    name: E2E - Tauri [Linux] - ${{ matrix.test-type }}
    needs: [detect-changes, build, build-tauri-e2e-app-linux]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        test-type: ['standard', 'window', 'multiremote', 'standalone', 'deeplink']
    uses: ./.github/workflows/_ci-e2e-tauri-all-providers.reusable.yml
    secrets: inherit
    with:
      os: 'ubuntu-latest'
      node-version: '24'
      test-type: ${{ matrix.test-type }}
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}
      tauri_cache_key: ${{ needs.build-tauri-e2e-app-linux.outputs.cache_key }}

  e2e-tauri-windows:
    name: E2E - Tauri [Windows] - ${{ matrix.test-type }}
    needs: [detect-changes, build, build-tauri-e2e-app-windows]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        test-type: ['standard', 'window', 'multiremote', 'standalone', 'deeplink']
    uses: ./.github/workflows/_ci-e2e-tauri-all-providers.reusable.yml
    secrets: inherit
    with:
      os: 'windows-latest'
      node-version: '24'
      test-type: ${{ matrix.test-type }}
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}
      tauri_cache_key: ${{ needs.build-tauri-e2e-app-windows.outputs.cache_key }}

  e2e-tauri-macos-arm:
    name: E2E - Tauri [macOS-ARM] - ${{ matrix.test-type }}
    needs: [detect-changes, build, build-tauri-e2e-app-macos-arm]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        test-type: ['standard', 'window', 'multiremote', 'standalone', 'deeplink']
    uses: ./.github/workflows/_ci-e2e-tauri-all-providers.reusable.yml
    secrets: inherit
    with:
      os: 'macos-latest'
      node-version: '24'
      test-type: ${{ matrix.test-type }}
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}
      tauri_cache_key: ${{ needs.build-tauri-e2e-app-macos-arm.outputs.cache_key }}

  e2e-tauri-macos-intel:
    name: E2E - Tauri [macOS-Intel] - ${{ matrix.test-type }}
    needs: [detect-changes, build, build-tauri-e2e-app-macos-intel]
    if: needs.detect-changes.outputs.run_tauri == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    strategy:
      fail-fast: false
      matrix:
        test-type: ['standard', 'window', 'multiremote', 'standalone', 'deeplink']
    uses: ./.github/workflows/_ci-e2e-tauri-all-providers.reusable.yml
    secrets: inherit
    with:
      os: 'macos-15-intel'
      node-version: '24'
      test-type: ${{ matrix.test-type }}
      build_id: ${{ needs.build.outputs.build_id }}
      artifact_size: ${{ needs.build.outputs.artifact_size }}
      cache_key: ${{ needs.build.outputs.cache_key }}
      tauri_cache_key: ${{ needs.build-tauri-e2e-app-macos-intel.outputs.cache_key }}

  # Universal binary verification - Electron only
  package-electron-mac-universal:
    name: Package - Electron [macOS-Universal-Verify]
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.run_electron == 'true' && needs.detect-changes.outputs.run_lint_only != 'true'
    runs-on: macos-latest
    steps:
      - name: 👷 Checkout Repository
        uses: actions/checkout@v6

      - name: 🛠️ Setup Development Environment
        uses: ./.github/workflows/actions/setup-workspace
        with:
          node-version: '24'

      - name: 📦 Download Build Artifacts
        uses: ./.github/workflows/actions/download-archive
        with:
          name: wdio-desktop-mobile
          path: wdio-desktop-mobile-build
          filename: artifact.zip
          cache_key_prefix: wdio-desktop-build
          exact_cache_key: ${{ needs.build.outputs.cache_key || github.run_id && format('{0}-{1}-{2}-{3}{4}', 'Linux', 'wdio-desktop-build', 'wdio-desktop-mobile', github.run_id, github.run_attempt > 1 && format('-rerun{0}', github.run_attempt) || '') || '' }}

      - name: 🔨 Build Universal Binary (Electron Builder)
        run: pnpm --filter electron-builder-e2e-app build:mac-universal

      - name: ✅ Verify Universal Binary Contains Both Architectures (Builder)
        run: |
          BINARY_PATH="fixtures/e2e-apps/electron-builder/dist-electron/mac-universal/electron-builder-e2e-app.app/Contents/MacOS/electron-builder-e2e-app"

          if [ ! -f "$BINARY_PATH" ]; then
            echo "❌ Binary not found at $BINARY_PATH"
            echo "Contents of dist-electron/mac-universal:"
            ls -la fixtures/e2e-apps/electron-builder/dist-electron/mac-universal/ || echo "Directory does not exist"
            exit 1
          fi

          echo "Binary found, checking architecture..."
          lipo -info "$BINARY_PATH"

          ARCHS=$(lipo -info "$BINARY_PATH" | grep "Architectures" | awk '{print $(NF-1), $NF}')
          echo "Found architectures: $ARCHS"

          if [[ "$ARCHS" != *"x86_64"* ]]; then
            echo "❌ Missing x86_64 architecture"
            exit 1
          fi

          if [[ "$ARCHS" != *"arm64"* ]]; then
            echo "❌ Missing arm64 architecture"
            exit 1
          fi

          echo "✅ Universal binary verified: $ARCHS"

      - name: 🔨 Build Universal Binary (Electron Forge)
        run: pnpm --filter electron-forge-e2e-app build:mac-universal

      - name: ✅ Verify Universal Binary Contains Both Architectures (Forge)
        run: |
          BINARY_PATH="fixtures/e2e-apps/electron-forge/out/electron-forge-e2e-app-darwin-universal/electron-forge-e2e-app.app/Contents/MacOS/electron-forge-e2e-app"

          if [ ! -f "$BINARY_PATH" ]; then
            echo "❌ Binary not found at $BINARY_PATH"
            echo "Contents of out/:"
            ls -la fixtures/e2e-apps/electron-forge/out/ || echo "Directory does not exist"
            exit 1
          fi

          echo "Binary found, checking architecture..."
          lipo -info "$BINARY_PATH"

          ARCHS=$(lipo -info "$BINARY_PATH" | grep "Architectures" | awk '{print $(NF-1), $NF}')
          echo "Found architectures: $ARCHS"

          if [[ "$ARCHS" != *"x86_64"* ]]; then
            echo "❌ Missing x86_64 architecture"
            exit 1
          fi

          if [[ "$ARCHS" != *"arm64"* ]]; then
            echo "❌ Missing arm64 architecture"
            exit 1
          fi

          echo "✅ Universal binary verified: $ARCHS"

  # Single status check gate - use this as the sole required check in branch protection
  # Avoids needing to update branch protection rules when CI jobs are added/removed
  ci-status:
    name: CI Status
    if: always()
    needs:
      - lint
      - unit-matrix
      - e2e-matrix
      - e2e-electron-window
      - e2e-tauri-linux
      - e2e-tauri-windows
      - e2e-tauri-macos-arm
      - e2e-tauri-macos-intel
      - package-electron-matrix
      - package-tauri-linux
      - package-tauri-windows
      - package-tauri-linux-arm
      - package-tauri-distros
      - build-matrix
      - package-electron-mac-universal
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Job results: $results"
          for result in $results; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "CI failed: found job with result '$result'"
              exit 1
            fi
          done
          echo "All CI jobs passed or were skipped"
