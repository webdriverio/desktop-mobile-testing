name: Release (Reusable)

on:
  workflow_call:
    inputs:
      target_packages:
        description: 'Comma-separated list of packages to release (derived from scope if not provided)'
        required: false
        type: string
        default: ''
      target_branch:
        description: 'Branch to release from'
        required: true
        type: string
      bump:
        description: 'Version increment (patch, minor, major)'
        required: true
        type: string
      stable:
        description: 'Graduate prerelease to stable without bumping'
        required: false
        type: string
        default: 'false'
      release_type:
        description: 'Release type (stable or prerelease)'
        required: false
        type: string
        default: 'prerelease'
      dry_run:
        description: 'Dry run mode'
        required: false
        type: boolean
        default: false
      scope:
        description: 'Release scope (electron, tauri, shared) — controls build and toolchain steps'
        required: true
        type: string
    secrets:
      ssh_key:
        description: 'SSH deploy key for pushing to the repository'
        required: false
      crates_io_token:
        description: 'Crates.io token for publishing Rust crates (required for Tauri)'
        required: false
      ollama_api_key:
        description: 'Ollama API key for LLM-enhanced release notes'
        required: false

permissions:
  id-token: write
  contents: write

env:
  NPM_CONFIG_PROVENANCE: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          ssh-key: ${{ secrets.ssh_key }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        if: ${{ contains(inputs.scope, 'tauri') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install GTK development libraries
        if: ${{ contains(inputs.scope, 'tauri') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libglib2.0-dev \
            libsoup2.4-dev \
            pkg-config
          sudo apt-get install -y libwebkit2gtk-4.0-dev || true
          sudo apt-get install -y libwebkit2gtk-4.1-dev || true
          sudo apt-get install -y libappindicator3-dev || true
          sudo apt-get install -y libayatana-appindicator3-dev || true
          sudo apt-get install -y libsoup3-dev || true

      - name: Compute target packages from scope
        id: targets
        run: |
          case "${{ inputs.scope }}" in
            electron)
              echo "packages=@wdio/electron-service,@wdio/electron-cdp-bridge" >> $GITHUB_OUTPUT
              ;;
            tauri)
              echo "packages=@wdio/tauri-service,@wdio/tauri-plugin" >> $GITHUB_OUTPUT
              ;;
            utils)
              echo "packages=@wdio/native-utils" >> $GITHUB_OUTPUT
              ;;
            types)
              echo "packages=@wdio/native-types" >> $GITHUB_OUTPUT
              ;;
            spy)
              echo "packages=@wdio/native-spy" >> $GITHUB_OUTPUT
              ;;
            shared)
              echo "packages=@wdio/native-utils,@wdio/native-types,@wdio/native-spy" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unknown scope: ${{ inputs.scope }}"
              exit 1
              ;;
          esac

      - name: Compute releasekit parameters
        id: params
        run: |
          bump="${{ inputs.bump }}"
          release_type="${{ inputs.release_type }}"

          # If bump already starts with 'pre', it's already in releasekit format (from auto gate)
          if [[ "$bump" == pre* ]]; then
            echo "bump=$bump" >> $GITHUB_OUTPUT
            echo "stable=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          case "$release_type" in
            stable)
              # stable release - use bump value
              echo "bump=$bump" >> $GITHUB_OUTPUT
              echo "stable=true" >> $GITHUB_OUTPUT
              ;;
            prerelease)
              # prepend 'pre' to make it a prerelease
              echo "bump=pre$bump" >> $GITHUB_OUTPUT
              echo "stable=false" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "bump=$bump" >> $GITHUB_OUTPUT
              echo "stable=false" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build packages
        run: |
          scope="${{ inputs.scope }}"
          scope="${scope#scope:}"
          case "$scope" in
            electron)
              pnpm turbo run build \
                --filter='@wdio/electron-service...' \
                --filter='@wdio/electron-cdp-bridge...' \
                --filter='@wdio/bundler...'
              ;;
            tauri)
              pnpm turbo run build \
                --filter='@wdio/tauri-service...' \
                --filter='@wdio/tauri-plugin...'
              ;;
            utils)
              pnpm turbo run build --filter='@wdio/native-utils...'
              ;;
            types)
              pnpm turbo run build --filter='@wdio/native-types...'
              ;;
            spy)
              pnpm turbo run build --filter='@wdio/native-spy...'
              ;;
            shared)
              pnpm turbo run build \
                --filter='@wdio/native-types...' \
                --filter='@wdio/native-utils...' \
                --filter='@wdio/native-spy...'
              ;;
            *)
              echo "::error::Unknown scope: $scope"
              exit 1
              ;;
          esac

      - name: Verify package contents
        run: |
          scope="${{ inputs.scope }}"
          scope="${scope#scope:}"
          case "$scope" in
            spy)
              echo "Verifying @wdio/native-spy package contents..."
              cd packages/native-spy
              ls -la dist/
              npm pack --dry-run
              ;;
            *)
              echo "Skipping package verification for scope: $scope"
              ;;
          esac

      - name: Configure Git
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run ReleaseKit
        id: releasekit
        uses: goosewobbler/releasekit@v0.13.12
        with:
          mode: release
          node-version: '24'
          target: ${{ steps.targets.outputs.packages }}
          branch: ${{ inputs.target_branch }}
          bump: ${{ steps.params.outputs.bump }}
          stable: ${{ steps.params.outputs.stable }}
          json: 'true'
          dry-run: ${{ inputs.dry_run }}
          project-dir: .
          verbose: 'true'
          summary: 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.crates_io_token }}
          OLLAMA_API_KEY: ${{ secrets.ollama_api_key }}
