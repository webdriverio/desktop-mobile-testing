name: Release Native Packages

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - premajor
          - preminor
          - prepatch
      packages:
        description: 'Packages to release'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - native-types
          - native-utils
          - native-spy
          - native-types,native-utils
          - native-types,native-spy
          - native-utils,native-spy
      dry_run:
        description: 'Dry run (show what would happen, make no changes)'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-native-packages
  cancel-in-progress: false

jobs:
  release-native:
    name: Release Native Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine packages to release
        id: packages
        run: |
          SELECTED="${{ inputs.packages }}"
          echo "Selected packages: $SELECTED"
          echo ""
          
          # Function to check if a package is selected
          is_selected() {
            case "$SELECTED" in
              all) return 0 ;;
              *"$1"*) return 0 ;;
              *) return 1 ;;
            esac
          }
          
          # Set output variables for each package
          if is_selected "native-types"; then
            echo "types=true" >> $GITHUB_OUTPUT
            echo "📦 Will release @wdio/native-types"
          else
            echo "types=false" >> $GITHUB_OUTPUT
            echo "📦 Skipping @wdio/native-types"
          fi
          
          if is_selected "native-utils"; then
            echo "utils=true" >> $GITHUB_OUTPUT
            echo "📦 Will release @wdio/native-utils"
          else
            echo "utils=false" >> $GITHUB_OUTPUT
            echo "📦 Skipping @wdio/native-utils"
          fi
          
          if is_selected "native-spy"; then
            echo "spy=true" >> $GITHUB_OUTPUT
            echo "📦 Will release @wdio/native-spy"
          else
            echo "spy=false" >> $GITHUB_OUTPUT
            echo "📦 Skipping @wdio/native-spy"
          fi

      - name: Build packages
        run: pnpm turbo run build --filter='@wdio/native-types...' --filter='@wdio/native-utils...' --filter='@wdio/native-spy...'

      - name: Calculate versions
        id: version
        run: |
          echo "🧮 Calculating versions for native packages..."
          echo "Release type: ${{ inputs.release_version }}"
          echo ""

          # Calculate version for native-types (if selected)
          if [[ "${{ steps.packages.outputs.types }}" == "true" ]]; then
            echo "📦 Processing @wdio/native-types..."
            echo "Running: pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} --dry-run --json -t @wdio/native-types"
            TYPES_RESULT=$(pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} --dry-run --json -t @wdio/native-types)
            echo "Raw output:"
            echo "$TYPES_RESULT" | head -20
            TYPES_VERSION=$(echo "$TYPES_RESULT" | jq -r '.updates[0].newVersion // empty')
            TYPES_CURRENT=$(echo "$TYPES_RESULT" | jq -r '.updates[0].oldVersion // empty')
            echo "types_version=$TYPES_VERSION" >> $GITHUB_OUTPUT
            echo "types_current=$TYPES_CURRENT" >> $GITHUB_OUTPUT
          fi

          # Calculate version for native-utils (if selected)
          if [[ "${{ steps.packages.outputs.utils }}" == "true" ]]; then
            echo "📦 Processing @wdio/native-utils..."
            echo "Running: pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} --dry-run --json -t @wdio/native-utils"
            UTILS_RESULT=$(pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} --dry-run --json -t @wdio/native-utils)
            echo "Raw output:"
            echo "$UTILS_RESULT" | head -20
            UTILS_VERSION=$(echo "$UTILS_RESULT" | jq -r '.updates[0].newVersion // empty')
            UTILS_CURRENT=$(echo "$UTILS_RESULT" | jq -r '.updates[0].oldVersion // empty')
            echo "utils_version=$UTILS_VERSION" >> $GITHUB_OUTPUT
            echo "utils_current=$UTILS_CURRENT" >> $GITHUB_OUTPUT
          fi

          # Calculate version for native-spy (if selected)
          if [[ "${{ steps.packages.outputs.spy }}" == "true" ]]; then
            echo "📦 Processing @wdio/native-spy..."
            echo "Running: pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} --dry-run --json -t @wdio/native-spy"
            SPY_RESULT=$(pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} --dry-run --json -t @wdio/native-spy)
            echo "Raw output:"
            echo "$SPY_RESULT" | head -20
            SPY_VERSION=$(echo "$SPY_RESULT" | jq -r '.updates[0].newVersion // empty')
            SPY_CURRENT=$(echo "$SPY_RESULT" | jq -r '.updates[0].oldVersion // empty')
            echo "spy_version=$SPY_VERSION" >> $GITHUB_OUTPUT
            echo "spy_current=$SPY_CURRENT" >> $GITHUB_OUTPUT
          fi

          echo ""
          echo "📋 VERSION CALCULATION RESULTS:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          [[ "${{ steps.packages.outputs.types }}" == "true" ]] && echo "📦 @wdio/native-types: ${{ steps.version.outputs.types_current }} → ${{ steps.version.outputs.types_version }}"
          [[ "${{ steps.packages.outputs.utils }}" == "true" ]] && echo "📦 @wdio/native-utils: ${{ steps.version.outputs.utils_current }} → ${{ steps.version.outputs.utils_version }}"
          [[ "${{ steps.packages.outputs.spy }}" == "true" ]] && echo "📦 @wdio/native-spy: ${{ steps.version.outputs.spy_current }} → ${{ steps.version.outputs.spy_version }}"
          echo ""

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🧪 DRY RUN MODE - Testing all steps without making permanent changes"
            echo ""
            echo "📝 This dry run will:"
            echo "  • Calculate target versions (✅ already done)"
            echo "  • Test NPM authentication and publish process"
            echo "  • Show what would be published"
            echo ""
            echo "📋 Live release would additionally:"
            echo "  • Update package.json versions"
            echo "  • Generate and commit changelogs"
            echo "  • Create git tags for selected packages"
            echo "  • Push commits to repository"
            echo "  • Actually publish packages to NPM"
            echo "  • Create GitHub releases"
            echo ""
          fi

      - name: Update package versions
        if: ${{ !inputs.dry_run && (steps.packages.outputs.types == 'true' || steps.packages.outputs.utils == 'true' || steps.packages.outputs.spy == 'true') }}
        run: |
          # Configure git first (needed by package-versioner for commits)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "Updating native-types to ${{ steps.version.outputs.types_version }}..."
          if [[ "${{ steps.packages.outputs.types }}" == "true" ]]; then
            echo "Running: pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} -t @wdio/native-types"
            pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} -t @wdio/native-types
          else
            echo "Skipping (not selected)"
          fi

          echo "Updating native-utils to ${{ steps.version.outputs.utils_version }}..."
          if [[ "${{ steps.packages.outputs.utils }}" == "true" ]]; then
            echo "Running: pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} -t @wdio/native-utils"
            pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} -t @wdio/native-utils
          else
            echo "Skipping (not selected)"
          fi

          echo "Updating native-spy to ${{ steps.version.outputs.spy_version }}..."
          if [[ "${{ steps.packages.outputs.spy }}" == "true" ]]; then
            echo "Running: pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} -t @wdio/native-spy"
            pnpm --loglevel=error package-versioner --bump ${{ inputs.release_version }} -t @wdio/native-spy
          else
            echo "Skipping (not selected)"
          fi

          # Show what was created
          echo ""
          echo "Git status:"
          git status
          echo ""
          echo "Recent commits:"
          git log --oneline -5
          echo ""
          echo "Tags created:"
          git tag --points-at HEAD
          echo ""

          # Note: Commits and tags created locally by package-versioner
          # Push will happen after successful publish

      - name: Configure NPM registry
        if: ${{ !inputs.dry_run }}
        run: |
          pnpm config set registry "https://registry.npmjs.org/"

      - name: Publish to NPM
        if: ${{ !inputs.dry_run && (steps.packages.outputs.types == 'true' || steps.packages.outputs.utils == 'true' || steps.packages.outputs.spy == 'true') }}
        env:
          NPM_CONFIG_PROVENANCE: true
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "🧪 DRY RUN: Testing NPM publish (will not actually publish)"
            DRY_RUN_FLAG="--dry-run"
          else
            echo "🚀 LIVE RELEASE: Publishing to NPM"
            DRY_RUN_FLAG=""
          fi

          if [[ "${{ steps.packages.outputs.types }}" == "true" ]]; then
            echo "Publishing @wdio/native-types@${{ steps.version.outputs.types_version }}..."
            cd packages/native-types
            pnpm publish --access public --no-git-checks $DRY_RUN_FLAG
            cd ../..
          fi

          if [[ "${{ steps.packages.outputs.utils }}" == "true" ]]; then
            echo "Publishing @wdio/native-utils@${{ steps.version.outputs.utils_version }}..."
            cd packages/native-utils
            pnpm publish --access public --no-git-checks $DRY_RUN_FLAG
            cd ../..
          fi

          if [[ "${{ steps.packages.outputs.spy }}" == "true" ]]; then
            echo "Publishing @wdio/native-spy@${{ steps.version.outputs.spy_version }}..."
            cd packages/native-spy
            pnpm publish --access public --no-git-checks $DRY_RUN_FLAG
            cd ../..
          fi

          echo "Publishing @wdio/native-utils@${{ steps.version.outputs.utils_version }}..."
          cd packages/native-utils
          pnpm publish --access public --no-git-checks $DRY_RUN_FLAG
          cd ../..

          echo "Publishing @wdio/native-spy@${{ steps.version.outputs.spy_version }}..."
          cd packages/native-spy
          pnpm publish --access public --no-git-checks $DRY_RUN_FLAG
          cd ../..

          echo "Publishing @wdio/native-utils@${{ steps.version.outputs.utils_version }}..."
          cd packages/native-utils
          pnpm publish --access public --no-git-checks $DRY_RUN_FLAG
          cd ../..

      - name: Push Version Commits and Tags
        if: ${{ !inputs.dry_run }}
        run: |
          echo "Publishing successful - pushing version commits and tags..."
          git push --no-verify
          git push --no-verify --tags
          echo "✅ Version commits and tags pushed successfully"

      - name: Create GitHub Releases
        if: ${{ !inputs.dry_run && (steps.packages.outputs.types == 'true' || steps.packages.outputs.utils == 'true' || steps.packages.outputs.spy == 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ steps.packages.outputs.types }}" == "true" ]]; then
            gh release create "@wdio/native-types@v${{ steps.version.outputs.types_version }}" \
              --title "@wdio/native-types v${{ steps.version.outputs.types_version }}" \
              --notes-file packages/native-types/CHANGELOG.md \
              --latest=false
          fi

          if [[ "${{ steps.packages.outputs.utils }}" == "true" ]]; then
            gh release create "@wdio/native-utils@v${{ steps.version.outputs.utils_version }}" \
              --title "@wdio/native-utils v${{ steps.version.outputs.utils_version }}" \
              --notes-file packages/native-utils/CHANGELOG.md \
              --latest=false
          fi

          if [[ "${{ steps.packages.outputs.spy }}" == "true" ]]; then
            gh release create "@wdio/native-spy@v${{ steps.version.outputs.spy_version }}" \
              --title "@wdio/native-spy v${{ steps.version.outputs.spy_version }}" \
              --notes-file packages/native-spy/CHANGELOG.md \
              --latest=false
          fi

      - name: Summary
        run: |
          echo "## 📦 Native Packages Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release Type:** ${{ inputs.release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Packages:** ${{ inputs.packages }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ inputs.dry_run && '🧪 Dry Run' || '🚀 Live Release' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📋 Package Versions" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Target Version | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.packages.outputs.types }}" == "true" ]]; then
            STATUS="${{ inputs.dry_run && '🧪 Dry run tested' || '✅ Published' }}"
            echo "| @wdio/native-types | ${{ steps.version.outputs.types_version }} | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| @wdio/native-types | - | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.packages.outputs.utils }}" == "true" ]]; then
            STATUS="${{ inputs.dry_run && '🧪 Dry run tested' || '✅ Published' }}"
            echo "| @wdio/native-utils | ${{ steps.version.outputs.utils_version }} | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| @wdio/native-utils | - | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.packages.outputs.spy }}" == "true" ]]; then
            STATUS="${{ inputs.dry_run && '🧪 Dry run tested' || '✅ Published' }}"
            echo "| @wdio/native-spy | ${{ steps.version.outputs.spy_version }} | $STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| @wdio/native-spy | - | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "### 📝 Dry Run Details" >> $GITHUB_STEP_SUMMARY
            echo "This was a dry run - no permanent changes were made." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**What was tested:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Version calculations" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ NPM authentication" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Package publishing (dry-run)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**What would happen in a live release:**" >> $GITHUB_STEP_SUMMARY
            echo "- 📄 Update package.json versions" >> $GITHUB_STEP_SUMMARY
            echo "- 📝 Generate changelogs" >> $GITHUB_STEP_SUMMARY
            echo "- 🏷️ Create git tags and push to repository" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 **Actually publish** packages to NPM registry" >> $GITHUB_STEP_SUMMARY
            echo "- 🏷️ Create GitHub releases" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To perform an actual release, run this workflow with **Dry Run: ☐** (unchecked)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Release Complete" >> $GITHUB_STEP_SUMMARY
            echo "**Actions performed:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Updated package.json versions" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Generated changelogs" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Created git tags and pushed to repository" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Published packages to NPM" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Created GitHub releases" >> $GITHUB_STEP_SUMMARY
          fi

