name: Release Native Packages

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
      dry_run:
        description: 'Dry run (show what would happen, make no changes)'
        required: false
        type: boolean
        default: true

concurrency:
  group: release-native-packages
  cancel-in-progress: false

jobs:
  release:
    uses: ./.github/workflows/_release.reusable.yml
    permissions:
      contents: write
      id-token: write
    with:
      target_packages: '@wdio/native-types,@wdio/native-utils'
      target_branch: main
      bump: ${{ inputs.release_version }}
      dry_run: ${{ inputs.dry_run }}
      scope: native
    secrets:
      deploy_key: ${{ secrets.DEPLOY_KEY }}
      ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}
