<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>🔨 Electron Forge E2E Test App</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        color: white;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .container {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border-radius: 25px;
        padding: 50px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.25);
        max-width: 800px;
        width: 100%;
      }
      h1 {
        margin: 0 0 25px 0;
        font-size: 3em;
        font-weight: 200;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      }
      .subtitle {
        font-size: 1.2em;
        opacity: 0.9;
        margin-bottom: 40px;
      }
      button {
        background: rgba(255, 255, 255, 0.25);
        border: 2px solid rgba(255, 255, 255, 0.4);
        color: white;
        padding: 15px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1em;
        font-weight: 500;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
        margin: 8px;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.35);
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      }
      .button-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin: 30px 0;
      }
      .info-section {
        margin-top: 40px;
        padding: 25px;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 15px;
        font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
        font-size: 0.95em;
        line-height: 1.5;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .status-item {
        display: flex;
        justify-content: space-between;
        margin: 8px 0;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .status-item:last-child {
        border-bottom: none;
      }
      .badge {
        display: inline-block;
        background: rgba(255, 255, 255, 0.2);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8em;
        margin: 0 5px;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .none {
        display: none;
      }
      .click-counter {
        background: rgba(255, 255, 255, 0.1);
        padding: 15px;
        border-radius: 10px;
        margin: 10px 0;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔨 Electron Forge E2E</h1>
      <p class="subtitle">
        Built with <span class="badge">Electron Forge</span>
        and <span class="badge">electron-vite</span>
      </p>

      <div class="button-grid">
        <button id="make-bigger" data-testid="make-bigger">Make Window Larger</button>
        <button id="make-smaller" data-testid="make-smaller">Make Window Smaller</button>
        <button type="button" class="show-dialog">show dialog</button>
      </div>

      <div class="info-section">
        <div class="keypress-count" data-testid="keypress-count"></div>
        <div class="click-count" data-testid="click-count">
          Bigger clicked: <span class="bigger">0</span> Smaller clicked: <span class="smaller">0</span>
        </div>
      </div>

      <!-- Elements for testing -->
      <label for="disabled-checkbox">
        Disabled checkbox
        <input id="disabled-checkbox" type="checkbox" data-testid="disabled-checkbox" disabled />
      </label>
      <textarea class="none" rows="10" cols="80" data-testid="hidden-textarea"></textarea>
    </div>

    <script>
      // Console logs for testing
      console.log('render log');
      console.warn('render warn');
      console.error('render error');

      // Initialize counters
      let biggerCount = 0;
      let smallerCount = 0;

      // Wait for the window.api to be available
      const waitForAPI = () => {
        return new Promise((resolve) => {
          if (window.api) {
            resolve();
          } else {
            const check = () => {
              if (window.api) {
                resolve();
              } else {
                setTimeout(check, 100);
              }
            };
            check();
          }
        });
      };

      // Initialize button handlers after API is ready
      const initializeHandlers = async () => {
        try {
          await waitForAPI();

          document.getElementById('make-bigger').addEventListener('click', () => {
            biggerCount++;
            document.querySelector('.click-count .bigger').textContent = biggerCount;
            window.api.invoke('increase-window-size');
          });

          document.getElementById('make-smaller').addEventListener('click', () => {
            smallerCount++;
            document.querySelector('.click-count .smaller').textContent = smallerCount;
            window.api.invoke('decrease-window-size');
          });

          // Show dialog handler
          document.querySelector('.show-dialog').addEventListener('click', () => {
            window.api.invoke('show-open-dialog');
          });

          // Keypress tracking - append characters
          document.addEventListener('keydown', (event) => {
            const keypressElem = document.querySelector('.keypress-count');
            keypressElem.textContent += String.fromCharCode(event.keyCode);
          });

          console.log('Button handlers initialized successfully');
        } catch (error) {
          console.error('Initialization error:', error);
        }
      };

      // Start initialization
      initializeHandlers();
    </script>
  </body>
</html>
